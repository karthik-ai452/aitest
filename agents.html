<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&family=Geist:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="static/css/styles.css" rel="stylesheet"/>
    <script src="static/js/tailwind-config.js"></script>
    <script>tailwind.config = window.CMDRUNNER_TAILWIND;</script>
</head>
<body class="bg-background text-on-surface selection:bg-primary/30" data-page="agents">

    <div id="sidebar-inject"></div>
    <div id="topnav-inject"></div>

    <!-- Main Content -->
    <main id="main-content" class="ml-sidebar-width pt-24 px-8 pb-12 min-h-screen">

        <!-- Actions Bar -->
        <div class="flex justify-between items-center mb-6">
            <div class="flex gap-3">
                <button id="upload-suite-btn" class="bg-primary-container text-on-primary-container px-4 py-2 rounded-lg font-label-caps text-label-caps flex items-center gap-2 hover:opacity-90 transition-all">
                    <span class="material-symbols-outlined text-lg">upload_file</span>
                    Upload test suite
                </button>
                <button id="run-agent-btn" class="bg-secondary-container text-on-secondary-container px-4 py-2 rounded-lg font-label-caps text-label-caps flex items-center gap-2 hover:opacity-90 transition-all">
                    <span class="material-symbols-outlined text-lg">play_arrow</span>
                    Run
                </button>
            </div>
            <button id="stop-agent-btn" class="border border-outline text-on-surface-variant px-4 py-2 rounded-lg font-label-caps text-label-caps flex items-center gap-2 hover:bg-surface-container-high transition-all">
                <span class="material-symbols-outlined text-lg">stop</span>
                Stop
            </button>
        </div>

        <!-- Dual-Pane Workspace -->
        <div class="flex gap-4 h-[calc(100vh-180px)]">
            <!-- Left Pane: Test Case Execution (20%) -->
            <div id="test-case-list" class="w-[20%] bg-surface-container-low border border-outline-variant rounded-xl flex flex-col overflow-hidden">
                <div class="px-4 py-3 border-b border-outline-variant bg-surface-container/50 flex items-center gap-2">
                    <span class="material-symbols-outlined text-primary text-lg">fact_check</span>
                    <h3 class="font-title-sm text-title-sm text-on-surface">Test Case Execution</h3>
                </div>
                <div class="flex-1 flex items-center justify-center p-6 text-center overflow-y-auto">
                    <div class="max-w-xs">
                        <p class="font-body-md text-body-md text-on-surface-variant opacity-80 leading-relaxed italic">
                            To start, upload a test case file (.xls, .pdf or .txt). Once uploaded, the test cases will be displayed here.
                        </p>
                    </div>
                </div>
            </div>
            <!-- Right Pane: Browser Preview (80%) -->
            <div class="w-[80%] bg-surface-container-lowest border border-outline-variant rounded-xl flex flex-col overflow-hidden">
                <div class="px-4 py-3 border-b border-outline-variant bg-surface-container/50 flex items-center justify-between">
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-on-surface-variant text-lg">language</span>
                        <h3 class="font-title-sm text-title-sm text-on-surface">Browser Preview</h3>
                    </div>
                    <div class="flex items-center gap-1">
                        <div class="w-3 h-3 rounded-full bg-error/40"></div>
                        <div class="w-3 h-3 rounded-full bg-tertiary/40"></div>
                        <div class="w-3 h-3 rounded-full bg-secondary/40"></div>
                    </div>
                </div>
                <div class="flex-1 flex items-center justify-center p-12 text-center bg-black/40">
                    <div class="max-w-xs">
                        <p class="font-body-md text-body-md text-on-surface-variant opacity-60 italic">
                            Browser will be displayed here.
                        </p>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <div id="modal-inject"></div>
    <script src="static/js/components.js"></script>
    <script src="static/js/sidebar.js"></script>
    <script src="static/js/app.js"></script>
</body>
</html>
