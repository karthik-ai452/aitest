<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&family=Geist:wght@400;500;600;900&display=swap" rel="stylesheet"/>
    <link href="static/css/styles.css" rel="stylesheet"/>
    <script src="static/js/tailwind-config.js"></script>
    <script>tailwind.config = window.CMDRUNNER_TAILWIND;</script>
</head>
<body class="bg-background text-on-surface" data-page="dashboard">

    <div id="sidebar-inject"></div>
    <div id="topnav-inject"></div>

    <!-- Main Content Canvas -->
    <main id="main-content" class="ml-sidebar-width pt-16 min-h-screen">
        <div class="p-margin-desktop max-w-container-max mx-auto">

            <!-- Page Header -->
            <div class="mb-12">
                <h2 class="font-display-lg text-display-lg text-on-surface">Dashboard</h2>
                <p class="font-body-md text-body-md text-on-surface-variant mt-1">Overview of your QA testing environment.</p>
            </div>

            <!-- Welcome State -->
            <div id="dashboard-welcome" class="flex flex-col items-center justify-center py-24 text-center">
                <div class="p-4 bg-surface-container-high rounded-2xl mb-6">
                    <span class="material-symbols-outlined text-on-surface-variant text-5xl">dashboard</span>
                </div>
                <h3 class="font-headline-md text-headline-md text-on-surface mb-2">Welcome to CmdRunner</h3>
                <p class="font-body-md text-body-md text-on-surface-variant max-w-md mb-8">Get started by creating a test suite or viewing your recent test runs.</p>
                <div class="flex gap-4">
                    <a href="suites.html" class="flex items-center gap-2 bg-primary-container text-on-primary-container px-6 py-3 rounded-xl font-label-caps text-label-caps shadow-lg hover:scale-95 transition-transform">
                        <span class="material-symbols-outlined">add</span>
                        Create Suite
                    </a>
                    <a href="runs.html" class="flex items-center gap-2 border border-outline-variant text-on-surface px-6 py-3 rounded-xl font-label-caps text-label-caps hover:bg-surface-container-high transition-colors">
                        <span class="material-symbols-outlined">history_toggle_off</span>
                        View Runs
                    </a>
                </div>
            </div>

            <!-- Stats State (shown when data exists) -->
            <div id="dashboard-stats" class="hidden"></div>

        </div>
    </main>

    <div id="modal-inject"></div>
    <script src="static/js/components.js"></script>
    <script src="static/js/sidebar.js"></script>
    <script src="static/js/app.js"></script>
</body>
</html>
