<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&family=Geist:wght@400;500;600;900&display=swap" rel="stylesheet"/>
    <link href="static/css/styles.css" rel="stylesheet"/>
    <script src="static/js/tailwind-config.js"></script>
    <script>tailwind.config = window.CMDRUNNER_TAILWIND;</script>
</head>
<body class="bg-background text-on-surface" data-page="suites">

    <div id="sidebar-inject"></div>
    <div id="topnav-inject"></div>

    <!-- Main Content Canvas -->
    <main id="main-content" class="ml-sidebar-width pt-16 min-h-screen">
        <div class="p-margin-desktop max-w-container-max mx-auto">

            <!-- Header Section -->
            <div class="flex justify-between items-end mb-12">
                <div>
                    <h2 class="font-display-lg text-display-lg text-on-surface">Test Suites</h2>
                    <p class="font-body-md text-body-md text-on-surface-variant mt-1">Manage and execute your core validation workflows.</p>
                </div>
                <button id="create-suite-btn-header" class="flex items-center gap-2 bg-primary-container text-on-primary-container px-6 py-3 rounded-xl font-label-caps text-label-caps shadow-lg hover:scale-95 transition-transform">
                    <span class="material-symbols-outlined">add</span>
                    Create New
                </button>
            </div>

            <!-- Empty State -->
            <div id="suites-empty" class="bento-grid">
                <div class="flex flex-col items-center justify-center col-span-full py-24 text-center">
                    <div class="p-4 bg-surface-container-high rounded-2xl mb-6">
                        <span class="material-symbols-outlined text-on-surface-variant text-5xl">collections_bookmark</span>
                    </div>
                    <h3 class="font-headline-md text-headline-md text-on-surface mb-2">No test suites yet</h3>
                    <p class="font-body-md text-body-md text-on-surface-variant max-w-md mb-8">Create your first test suite to start organizing and running automated validation workflows.</p>
                    <button id="create-suite-btn" class="flex items-center gap-2 bg-primary-container text-on-primary-container px-6 py-3 rounded-xl font-label-caps text-label-caps shadow-lg hover:scale-95 transition-transform">
                        <span class="material-symbols-outlined">add</span>
                        Create Test Suite
                    </button>
                </div>
            </div>

            <!-- Suite Cards Grid (populated by JS) -->
            <div id="suites-grid" class="bento-grid"></div>

        </div>
    </main>

    <!-- Create Suite Modal -->
    <div id="create-suite-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-[100]">
        <div class="bg-surface-container border border-outline-variant rounded-2xl p-6 w-full max-w-md shadow-2xl">
            <h3 class="font-headline-md text-headline-md text-on-surface mb-1">Create Test Suite</h3>
            <p class="font-body-sm text-body-sm text-on-surface-variant mb-6">Define a new test suite to organize your validation workflows.</p>
            <form id="create-suite-form" class="space-y-4">
                <div>
                    <label class="font-label-caps text-label-caps text-on-surface-variant block mb-1.5">SUITE NAME</label>
                    <input type="text" id="suite-name" required class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-2.5 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary" placeholder="e.g. Authentication Flow E2E"/>
                </div>
                <div>
                    <label class="font-label-caps text-label-caps text-on-surface-variant block mb-1.5">DESCRIPTION</label>
                    <textarea id="suite-desc" rows="3" class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-2.5 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary resize-none" placeholder="Describe what this test suite covers..."></textarea>
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="submit" class="flex-1 bg-primary-container text-on-primary-container font-label-caps text-label-caps py-2.5 rounded-lg hover:opacity-90 transition-opacity">Create Suite</button>
                    <button type="button" id="create-suite-cancel" class="flex-1 border border-outline-variant text-on-surface-variant font-label-caps text-label-caps py-2.5 rounded-lg hover:bg-surface-container-high transition-colors">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modal-inject"></div>
    <script src="static/js/components.js"></script>
    <script src="static/js/sidebar.js"></script>
    <script src="static/js/app.js"></script>
</body>
</html>
