{% extends "base.html" %}
{% block page_id %}suites{% endblock %}
{% block content %}
<div class="mb-8">
    <div class="flex items-center gap-3 mb-2">
        <a href="/test_suites" class="text-on-surface-variant hover:text-primary transition-colors">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <h2 class="font-display-lg text-display-lg text-on-surface">Create New Test Suite</h2>
    </div>
</div>

<!-- File Upload -->
<div class="bg-surface-container border border-outline-variant rounded-2xl p-6 max-w-3xl mb-6">
    <div class="text-center">
        <button id="upload-new-test-suite" class="px-6 py-3 rounded-xl border-2 border-dashed border-outline-variant text-on-surface-variant font-label-caps text-label-caps hover:bg-surface-container-high transition-colors flex items-center gap-2 mx-auto">
            <span class="material-symbols-outlined">upload_file</span> Upload a test suite file
        </button>
        <input type="file" id="test-suite-file" class="hidden" />
    </div>
</div>

<!-- Manual Create Form -->
<div class="bg-surface-container border border-outline-variant rounded-2xl p-6 max-w-3xl">
    <form method="POST" class="test-suite-form" action="/test_suites/new">
        <!-- Suite Name -->
        <div class="mb-6">
            <label class="font-label-caps text-label-caps text-on-surface-variant block mb-1.5">TEST SUITE NAME</label>
            <input type="text" id="test-suite-name" placeholder="e.g. My Test Suite"
                class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-2.5 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary">
        </div>

        <!-- Test Cases -->
        <div class="mb-6">
            <label class="font-label-caps text-label-caps text-on-surface-variant block mb-3">TEST CASES</label>
            <div id="test-cases-list" class="space-y-4"></div>

            <button type="button" id="btn-add-testcase" class="mt-3 w-full py-2.5 rounded-lg border-2 border-dashed border-outline-variant text-on-surface-variant font-label-caps text-label-caps hover:bg-surface-container-high transition-colors">+ Add test case</button>
        </div>

        <div class="flex gap-3 pt-2">
            <button type="submit" class="bg-primary-container text-on-primary-container font-label-caps text-label-caps py-2.5 px-6 rounded-lg hover:opacity-90 transition-opacity">Create Test Suite</button>
            <a href="/test_suites" class="border border-outline-variant text-on-surface-variant font-label-caps text-label-caps py-2.5 px-6 rounded-lg hover:bg-surface-container-high transition-colors">Cancel</a>
        </div>

        <!-- Test Case Template -->
        <template id="template-test-case">
            <fieldset class="test-case-fieldset bg-surface-container-low border border-outline-variant rounded-xl p-4">
                <legend class="font-label-caps text-label-caps text-on-surface-variant px-2">Test case <span class="test-case-number text-primary"></span></legend>
                <div class="mb-4">
                    <label class="font-body-sm text-body-sm text-on-surface-variant block mb-1">Name</label>
                    <div class="flex gap-2">
                        <input type="text" class="test-case-name flex-1 bg-surface-container-lowest border border-outline-variant rounded-lg px-3 py-2 font-body-sm text-body-sm text-on-surface focus:outline-none focus:border-primary"
                            placeholder="e.g. Test login functionality">
                        <button type="button" class="btn-remove-testcase px-3 py-2 rounded-lg border border-error/30 text-error font-label-caps text-label-caps hover:bg-error/10 transition-colors">Delete</button>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="font-body-sm text-body-sm text-on-surface-variant block mb-1">URL</label>
                    <input type="text" class="test-case-url w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-3 py-2 font-body-sm text-body-sm text-on-surface focus:outline-none focus:border-primary"
                        placeholder="e.g. https://www.example.com">
                </div>
                <div class="mb-2">
                    <label class="font-body-sm text-body-sm text-on-surface-variant block mb-2">Steps</label>
                    <div class="steps space-y-3"></div>
                    <button type="button" class="btn-add-step mt-2 px-3 py-1.5 rounded-lg border border-outline-variant text-on-surface-variant font-label-caps text-label-caps text-xs hover:bg-surface-container-high transition-colors">+ Add step</button>
                </div>
            </fieldset>
        </template>

        <!-- Step Template -->
        <template id="template-step">
            <fieldset class="step-fieldset bg-surface-container-lowest border border-outline-variant rounded-lg p-3">
                <legend class="font-label-caps text-label-caps text-on-surface-variant px-2">Step <span class="step-number text-primary"></span></legend>
                <div class="mb-3">
                    <label class="font-body-sm text-body-sm text-on-surface-variant block mb-1">Step name</label>
                    <div class="flex gap-2">
                        <input type="text" class="step-name flex-1 bg-surface-container border border-outline-variant rounded-lg px-3 py-1.5 font-body-sm text-body-sm text-on-surface focus:outline-none focus:border-primary"
                            placeholder="e.g. Click on the login button">
                        <button type="button" class="btn-remove-step px-2 py-1.5 rounded-lg border border-error/30 text-error font-label-caps text-label-caps text-xs hover:bg-error/10 transition-colors">Delete</button>
                    </div>
                </div>
                <div class="expectation-and-notes">
                    <div class="mb-2">
                        <label class="font-body-sm text-body-sm text-on-surface-variant block mb-1">Expectation (optional)</label>
                        <input type="text" class="step-expectation w-full bg-surface-container border border-outline-variant rounded-lg px-3 py-1.5 font-body-sm text-body-sm text-on-surface focus:outline-none focus:border-primary"
                            placeholder="e.g. The login page should appear">
                    </div>
                    <div class="mb-2">
                        <label class="font-body-sm text-body-sm text-on-surface-variant block mb-1">Notes (optional)</label>
                        <input type="text" class="step-notes w-full bg-surface-container border border-outline-variant rounded-lg px-3 py-1.5 font-body-sm text-body-sm text-on-surface focus:outline-none focus:border-primary"
                            placeholder="e.g. Use the customer login button, not the reseller login button">
                    </div>
                </div>
                <a href="#" class="btn-toggle-expectation font-body-sm text-body-sm text-primary hover:underline">+ Add Expectation & Notes</a>
            </fieldset>
        </template>
    </form>
</div>

<script>
(function() {
    'use strict';

    var container = document.getElementById('test-cases-list');
    var templateTC = document.getElementById('template-test-case');
    var templateStep = document.getElementById('template-step');

    if (!container || !templateTC || !templateStep) return;

    function updateNumbers() {
        var tcNum = 1;
        container.querySelectorAll('.test-case-fieldset').forEach(function(tc) {
            var numEl = tc.querySelector('.test-case-number');
            if (numEl) numEl.textContent = '#' + tcNum++;
            var stepNum = 1;
            tc.querySelectorAll('.step-fieldset').forEach(function(step) {
                var sNumEl = step.querySelector('.step-number');
                if (sNumEl) sNumEl.textContent = '#' + stepNum++;
            });
        });
    }

    function addStep(testCaseEl) {
        var stepsEl = testCaseEl.querySelector('.steps');
        if (!stepsEl) return;
        stepsEl.insertAdjacentHTML('beforeend', templateStep.innerHTML);
        updateNumbers();
    }

    function addTestCase() {
        container.insertAdjacentHTML('beforeend', templateTC.innerHTML);
        var allTC = container.querySelectorAll('.test-case-fieldset');
        var lastTC = allTC[allTC.length - 1];
        if (lastTC) addStep(lastTC);
        updateNumbers();
    }

    function makeJSON() {
        var suite = {
            name: document.querySelector('#test-suite-name') ? document.querySelector('#test-suite-name').value : '',
            test_cases: []
        };

        container.querySelectorAll('.test-case-fieldset').forEach(function(tc) {
            var tcJSON = {
                name: tc.querySelector('.test-case-name') ? tc.querySelector('.test-case-name').value : '',
                url: tc.querySelector('.test-case-url') ? tc.querySelector('.test-case-url').value : '',
                steps: []
            };
            tc.querySelectorAll('.step-fieldset').forEach(function(step) {
                tcJSON.steps.push({
                    name: step.querySelector('.step-name') ? step.querySelector('.step-name').value : '',
                    expectation: step.querySelector('.step-expectation') ? step.querySelector('.step-expectation').value : '',
                    notes: step.querySelector('.step-notes') ? step.querySelector('.step-notes').value : ''
                });
            });
            suite.test_cases.push(tcJSON);
        });
        return suite;
    }

    // Add initial test case
    addTestCase();

    // Add test case button
    var addBtn = document.getElementById('btn-add-testcase');
    if (addBtn) {
        addBtn.addEventListener('click', function() { addTestCase(); });
    }

    // Delegate clicks inside test-cases-list
    container.addEventListener('click', function(e) {
        var target = e.target;

        // Add Step
        if (target.classList.contains('btn-add-step')) {
            e.preventDefault();
            var tc = target.closest('.test-case-fieldset');
            if (tc) addStep(tc);
        }

        // Remove Step
        if (target.classList.contains('btn-remove-step')) {
            e.preventDefault();
            if (typeof show_prompt === 'function') {
                show_prompt('Delete step', 'Are you sure you want to delete this step?', {
                    'Delete|danger': function() { target.closest('.step-fieldset').remove(); updateNumbers(); },
                    'Cancel': function() {}
                }, {class: 'danger'});
            } else if (confirm('Delete this step?')) {
                target.closest('.step-fieldset').remove();
                updateNumbers();
            }
        }

        // Remove Test Case
        if (target.classList.contains('btn-remove-testcase')) {
            e.preventDefault();
            if (typeof show_prompt === 'function') {
                show_prompt('Delete test case', 'Are you sure you want to delete this test case?', {
                    'Delete|danger': function() { target.closest('.test-case-fieldset').remove(); updateNumbers(); },
                    'Cancel': function() {}
                }, {class: 'danger'});
            } else if (confirm('Delete this test case?')) {
                target.closest('.test-case-fieldset').remove();
                updateNumbers();
            }
        }

        // Toggle Expectation & Notes
        if (target.classList.contains('btn-toggle-expectation')) {
            e.preventDefault();
            var stepFS = target.closest('.step-fieldset');
            var expDiv = stepFS ? stepFS.querySelector('.expectation-and-notes') : null;
            if (expDiv) {
                if (expDiv.style.display !== 'block') {
                    target.textContent = '- Hide Expectation & Notes';
                    expDiv.style.display = 'block';
                } else {
                    target.textContent = '+ Add Expectation & Notes';
                    expDiv.style.display = 'none';
                }
            }
        }
    });

    // Form submit via JSON
    var form = document.querySelector('.test-suite-form');
    if (form) {
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            try {
                var response = await fetch(form.action, {
                    method: form.method,
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(makeJSON())
                });
                var data = await response.json();
                if (!response.ok || data.error) {
                    if (typeof show_alert === 'function') {
                        show_alert(data.error || 'Error saving test suite');
                    } else {
                        alert(data.error || 'Error saving test suite');
                    }
                    return;
                }
                if (data.redirect) {
                    window.location.href = data.redirect;
                } else {
                    if (typeof show_alert === 'function') {
                        show_alert('Test suite saved');
                    } else {
                        alert('Test suite saved');
                    }
                }
            } catch(err) {
                if (typeof show_alert === 'function') {
                    show_alert('Error saving test suite');
                } else {
                    alert('Error saving test suite');
                }
            }
        });
    }

    // File upload
    var uploadBtn = document.querySelector('#upload-new-test-suite');
    var fileInput = document.querySelector('#test-suite-file');
    if (uploadBtn && fileInput) {
        uploadBtn.addEventListener('click', function() { fileInput.click(); });
        fileInput.addEventListener('change', async function() {
            var file = fileInput.files[0];
            if (!file) return;
            uploadBtn.textContent = 'Uploading...';
            fileInput.value = '';
            var formData = new FormData();
            formData.append('file', file);
            try {
                var uploadResp = await fetch('/upload_test_suite_file', { method: 'POST', body: formData });
                if (!uploadResp.ok) {
                    var err = await uploadResp.json();
                    if (typeof show_alert === 'function') show_alert(err.error || 'Upload failed');
                    else alert(err.error || 'Upload failed');
                    uploadBtn.innerHTML = '<span class="material-symbols-outlined">upload_file</span> Upload a test suite file';
                    return;
                }
                var uploadData = await uploadResp.json();
                if (uploadData.error) {
                    if (typeof show_alert === 'function') show_alert(uploadData.error);
                    else alert(uploadData.error);
                    uploadBtn.innerHTML = '<span class="material-symbols-outlined">upload_file</span> Upload a test suite file';
                    return;
                }
                // Create test suite from upload
                var createResp = await fetch('/test_suites/new', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(uploadData.test_suite)
                });
                var createData = await createResp.json();
                if (!createResp.ok || createData.error) {
                    if (typeof show_alert === 'function') show_alert(createData.error || 'Error creating test suite');
                    else alert(createData.error || 'Error creating test suite');
                } else if (createData.redirect) {
                    window.location.href = createData.redirect;
                } else if (createData.id) {
                    window.location.href = '/test_suites/' + createData.id + '/edit';
                }
            } catch(err) {
                if (typeof show_alert === 'function') show_alert('Upload failed');
                else alert('Upload failed');
            }
            uploadBtn.innerHTML = '<span class="material-symbols-outlined">upload_file</span> Upload a test suite file';
        });
    }
})();
</script>
{% endblock %}
