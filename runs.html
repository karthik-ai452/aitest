<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Geist:wght@100..900&display=swap" rel="stylesheet"/>
    <link href="static/css/styles.css" rel="stylesheet"/>
    <script src="static/js/tailwind-config.js"></script>
    <script>tailwind.config = window.CMDRUNNER_TAILWIND;</script>
</head>
<body class="bg-background text-on-surface" data-page="runs">

    <div id="sidebar-inject"></div>
    <div id="topnav-inject"></div>

    <!-- Main Content Canvas -->
    <main id="main-content" class="ml-sidebar-width pt-16 min-h-screen">
        <div class="max-w-container-max mx-auto p-margin-desktop">

            <!-- Page Header -->
            <div class="flex items-end justify-between mb-8">
                <div>
                    <h2 class="font-display-lg text-display-lg text-on-surface">Test Runs</h2>
                    <p class="font-body-md text-body-md text-on-surface-variant mt-1">History of recent automated executions across all suites.</p>
                </div>
                <div class="flex gap-3">
                    <button class="flex items-center gap-2 px-3 py-1.5 border border-outline-variant rounded font-label-caps text-label-caps text-on-surface hover:bg-surface-container-high transition-colors">
                        <span class="material-symbols-outlined text-[18px]">filter_list</span>
                        Filter
                    </button>
                    <button class="flex items-center gap-2 px-3 py-1.5 border border-outline-variant rounded font-label-caps text-label-caps text-on-surface hover:bg-surface-container-high transition-colors">
                        <span class="material-symbols-outlined text-[18px]">download</span>
                        Export
                    </button>
                </div>
            </div>

            <!-- Test Runs Data — Connect your backend API here -->
            <!-- API ENDPOINT: GET /api/runs -->
            <!-- Add your API key in static/js/app.js → getRuns() function -->
            <div id="runs-data-container" class="bg-surface-container-low border border-outline-variant rounded-xl overflow-hidden">

                <!-- PLACE YOUR TABLE / LIST HERE FROM THE BACKEND -->
                <!-- Example: fetch('/api/runs', { headers: { 'Authorization': 'Bearer YOUR_API_KEY' } }) -->

            </div>

        </div>
    </main>

    <div id="modal-inject"></div>
    <script src="static/js/components.js"></script>
    <script src="static/js/sidebar.js"></script>
    <script src="static/js/app.js"></script>
</body>
</html>
