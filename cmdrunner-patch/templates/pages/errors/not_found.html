{% extends "base.html" %}
{% block page_id %}error{% endblock %}
{% block title %}404 — Not Found{% endblock %}

{% block content %}
<div class="max-w-md mx-auto text-center py-20">
    <div class="p-4 bg-surface-container rounded-2xl inline-block mb-6">
        <span class="material-symbols-outlined text-on-surface-variant text-5xl">error_outline</span>
    </div>
    <h1 class="font-display-lg text-display-lg text-on-surface mb-3">Page Not Found</h1>
    <p class="font-body-md text-body-md text-on-surface-variant mb-6">The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="inline-block bg-primary-container text-on-primary-container font-label-caps text-label-caps px-6 py-2.5 rounded-lg hover:opacity-90 transition-opacity">Go to Dashboard</a>
</div>
{% endblock %}
