{% extends "base.html" %}
{% block page_id %}change_password{% endblock %}
{% block title %}Change Password — CmdRunner{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
    <div class="mb-8">
        <h1 class="font-display-lg text-display-lg text-on-surface mb-2">Change Password</h1>
        <p class="font-body-md text-body-md text-on-surface-variant">Update your account password.</p>
    </div>

    <div class="bg-surface-container border border-outline-variant rounded-2xl p-6">
        <form method="POST" class="space-y-4">
            {% if has_password %}
            <div>
                <label class="font-label-caps text-label-caps text-on-surface-variant block mb-1.5">CURRENT PASSWORD</label>
                <input type="password" name="current_password" required
                    class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-2.5 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary"
                    placeholder="Enter current password"/>
            </div>
            {% endif %}
            <div>
                <label class="font-label-caps text-label-caps text-on-surface-variant block mb-1.5">NEW PASSWORD</label>
                <input type="password" name="new_password" required
                    class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-2.5 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary"
                    placeholder="Enter new password"/>
            </div>
            <div>
                <label class="font-label-caps text-label-caps text-on-surface-variant block mb-1.5">CONFIRM NEW PASSWORD</label>
                <input type="password" name="confirm_password" required
                    class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg px-4 py-2.5 font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary"
                    placeholder="Confirm new password"/>
            </div>
            <div class="flex gap-3 pt-2">
                <button type="submit" class="flex-1 bg-primary-container text-on-primary-container font-label-caps text-label-caps py-2.5 rounded-lg hover:opacity-90 transition-opacity">Update Password</button>
                <a href="/" class="flex-1 border border-outline-variant text-on-surface-variant font-label-caps text-label-caps py-2.5 rounded-lg hover:bg-surface-container-high transition-colors text-center">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
